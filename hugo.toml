baseURL = "https://dittocafe.com/"
languageCode = "zh-cn"
title = "DittoCafe"
defaultContentLanguage = "zh"

googleAnalytics = "G-CRXQLYSX6R"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # 允许在 Markdown 中渲染 HTML/链接

[params]
  env = "production"
  title = "DittoCafe"
  description = "A quiet portal connecting independent projects on trading and memos." # 💡 这里顺手把 essays 改为了 memos
  author = "Xihi"
  defaultTheme = "auto"

  # 💡 将这些 Show 开头的参数统一收录在 [params] 正下方，确保它们正确生效
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = false
  ShowTagsSection = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    name = "Trading"
    url = "https://trading.dittocafe.com"
    weight = 1

  [[menu.main]]
    name = "Memos"
    url = "https://memos.dittocafe.com"
    weight = 2

[outputs]
  home = ["HTML", "RSS", "JSON"]