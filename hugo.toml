baseURL = "https://dittocafe.com/"
languageCode = "zh-cn"
title = "DittoCafe"
defaultContentLanguage = "zh"

googleAnalytics = "G-CRXQLYSX6R"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "DittoCafe"
  description = "A quiet portal connecting independent projects on trading and essays."
  author = "Xihi"
  defaultTheme = "auto"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # 允许在 Markdown 中渲染 HTML/链接

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = false
  ShowTagsSection = false

[params.homeInfoParams]
  Title = "DittoCafe"
  Content = """
A quiet portal for trading and memos.

[Trading](https://trading.dittocafe.com)  
Price action, reviews, playbooks, and trading notes.

[Memos](https://memos.dittocafe.com)  
Thoughts on the go—about investing, trading, and AI.

Built slowly, kept simple.
"""

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    name = "Trading"
    url = "https://trading.dittocafe.com"
    weight = 1

  [[menu.main]]
    name = "Memos"
    url = "https://memos.dittocafe.com"
    weight = 2

[outputs]
  home = ["HTML", "RSS", "JSON"]
