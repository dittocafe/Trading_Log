{{ define "main" }}
<div class="portal-home">
  <section class="portal-intro">
    <h1>{{ .Title }}</h1>
    <p>{{ .Params.intro }}</p>
  </section>

  <section class="portal-grid">
    <a class="portal-card" href="https://trading.dittocafe.com">
      <h2>Trading</h2>
      <p>Price action, reviews, playbooks, and trading notes.</p>
    </a>

    <a class="portal-card" href="https://essays.dittocafe.com">
      <h2>Essays</h2>
      <p>Low-frequency writing on AI, tools, and other ongoing thoughts.</p>
    </a>
  </section>

  <section class="portal-notes">
    <h2>{{ .Params.recent_title }}</h2>
    <p>{{ .Params.recent_1 }}</p>
    <p>{{ .Params.recent_2 }}</p>
  </section>
</div>
{{ end }}
