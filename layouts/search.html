{{- define "main" }}
<div class="post-content">
  <div id="searchbox">
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default (printf "%s" (i18n "search_placeholder") | default "Search...") }}"
      aria-label="search" type="search" autocomplete="off">
    <ul id="searchResults" aria-label="search results"></ul>
  </div>
</div>
{{- end }}
